<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Appointment Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      margin-bottom: 30px;
      text-align: center;
    }

    header h1 {
      color: #2c3e50;
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    header p {
      color: #7f8c8d;
      font-size: 1.1em;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }

    .stat-number {
      font-size: 2.5em;
      font-weight: bold;
      color: #667eea;
      margin: 10px 0;
    }

    .stat-label {
      color: #7f8c8d;
      font-size: 1em;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .main-content {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 30px;
    }

    .form-section {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      height: fit-content;
    }

    .form-section h2 {
      color: #2c3e50;
      margin-bottom: 20px;
      border-bottom: 3px solid #667eea;
      padding-bottom: 10px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      color: #2c3e50;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ecf0f1;
      border-radius: 5px;
      font-size: 1em;
      transition: border-color 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-add {
      background: #27ae60;
      color: white;
    }

    .btn-add:hover {
      background: #229954;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(39, 174, 96, 0.3);
    }

    .btn-clear {
      background: #95a5a6;
      color: white;
    }

    .btn-clear:hover {
      background: #7f8c8d;
      transform: translateY(-2px);
    }

    .table-section {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .table-section h2 {
      color: #2c3e50;
      margin-bottom: 20px;
      border-bottom: 3px solid #667eea;
      padding-bottom: 10px;
    }

    .search-box {
      margin-bottom: 20px;
    }

    .search-box input {
      width: 100%;
      padding: 10px;
      border: 2px solid #ecf0f1;
      border-radius: 5px;
      font-size: 1em;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th {
      background: #34495e;
      color: white;
      padding: 15px;
      text-align: left;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    td {
      padding: 15px;
      border-bottom: 1px solid #ecf0f1;
    }

    tr:hover {
      background: #f8f9fa;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
    }

    .btn-delete {
      background: #e74c3c;
      color: white;
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9em;
      transition: all 0.3s ease;
    }

    .btn-delete:hover {
      background: #c0392b;
      transform: scale(1.05);
    }

    .btn-edit {
      background: #3498db;
      color: white;
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9em;
      transition: all 0.3s ease;
    }

    .btn-edit:hover {
      background: #2980b9;
      transform: scale(1.05);
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #7f8c8d;
    }

    .empty-state p {
      font-size: 1.1em;
    }

    @media (max-width: 1024px) {
      .main-content {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }

      header h1 {
        font-size: 1.8em;
      }

      .button-group {
        flex-direction: column;
      }
    }

    .success-message, .error-message {
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 15px;
      display: none;
      font-weight: 500;
    }

    .success-message {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .error-message {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🏥 Patient Appointment Dashboard</h1>
      <p>Manage your appointments efficiently</p>
    </header>

    <!-- Statistics Section -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Appointments</div>
        <div class="stat-number" id="totalAppointments">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Patients</div>
        <div class="stat-number" id="totalPatients">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Average Age</div>
        <div class="stat-number" id="averageAge">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Common Disease</div>
        <div class="stat-number" id="commonDisease">-</div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Form Section -->
      <div class="form-section">
        <h2>Add New Appointment</h2>
        <div id="successMessage" class="success-message"></div>
        <div id="errorMessage" class="error-message"></div>
        
        <div class="form-group">
          <label for="patientId">Patient ID</label>
          <input type="number" id="patientId" placeholder="Enter unique ID">
        </div>
        
        <div class="form-group">
          <label for="patientName">Patient Name</label>
          <input type="text" id="patientName" placeholder="Enter full name">
        </div>
        
        <div class="form-group">
          <label for="patientAge">Age</label>
          <input type="number" id="patientAge" placeholder="Enter age">
        </div>
        
        <div class="form-group">
          <label for="patientDisease">Disease/Reason</label>
          <input type="text" id="patientDisease" placeholder="Enter disease or reason">
        </div>

        <div class="button-group">
          <button class="btn-add" onclick="addPatient()">Add Appointment</button>
          <button class="btn-clear" onclick="clearForm()">Clear Form</button>
        </div>
      </div>

      <!-- Table Section -->
      <div class="table-section">
        <h2>Appointments List</h2>
        
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Search by name, ID, or disease..." onkeyup="filterTable()">
        </div>

        <table id="appointmentTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Age</th>
              <th>Disease/Reason</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="5" class="empty-state">
                <p>No appointments yet. Add one to get started!</p>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let appointments = JSON.parse(localStorage.getItem('appointments')) || [];
    let editingId = null;

    // Initialize
    displayAppointments();
    updateStats();

    function addPatient() {
      const id = document.getElementById('patientId').value.trim();
      const name = document.getElementById('patientName').value.trim();
      const age = document.getElementById('patientAge').value.trim();
      const disease = document.getElementById('patientDisease').value.trim();

      const errorMsg = document.getElementById('errorMessage');
      const successMsg = document.getElementById('successMessage');

      // Clear messages
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      // Validation
      if (!id || !name || !age || !disease) {
        showError('Please fill in all fields');
        return;
      }

      if (isNaN(id) || isNaN(age)) {
        showError('ID and Age must be numbers');
        return;
      }

      if (age < 0 || age > 150) {
        showError('Please enter a valid age');
        return;
      }

      // Check for duplicate ID
      if (!editingId && appointments.some(a => a.id === id)) {
        showError('Patient ID already exists');
        return;
      }

      if (editingId) {
        // Update existing
        const index = appointments.findIndex(a => a.id === editingId);
        if (index !== -1) {
          appointments[index] = { id, name, age, disease };
          showSuccess('Appointment updated successfully');
          editingId = null;
        }
      } else {
        // Add new
        appointments.push({ id, name, age, disease });
        showSuccess('Appointment added successfully');
      }

      saveAppointments();
      displayAppointments();
      updateStats();
      clearForm();
    }

    function displayAppointments() {
      const tableBody = document.getElementById('tableBody');

      if (appointments.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="5" class="empty-state"><p>No appointments yet. Add one to get started!</p></td></tr>';
        return;
      }

      tableBody.innerHTML = appointments.map((apt, index) => `
        <tr>
          <td>${apt.id}</td>
          <td>${apt.name}</td>
          <td>${apt.age}</td>
          <td>${apt.disease}</td>
          <td>
            <div class="action-buttons">
              <button class="btn-edit" onclick="editPatient('${apt.id}')">Edit</button>
              <button class="btn-delete" onclick="deletePatient('${apt.id}')">Delete</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function editPatient(id) {
      const appointment = appointments.find(a => a.id === id);
      if (appointment) {
        document.getElementById('patientId').value = appointment.id;
        document.getElementById('patientName').value = appointment.name;
        document.getElementById('patientAge').value = appointment.age;
        document.getElementById('patientDisease').value = appointment.disease;
        editingId = id;
        document.getElementById('patientId').disabled = true;
        document.querySelector('.btn-add').textContent = 'Update Appointment';
        document.getElementById('patientName').focus();
      }
    }

    function deletePatient(id) {
      if (confirm('Are you sure you want to delete this appointment?')) {
        appointments = appointments.filter(a => a.id !== id);
        saveAppointments();
        displayAppointments();
        updateStats();
        showSuccess('Appointment deleted successfully');
      }
    }

    function clearForm() {
      document.getElementById('patientId').value = '';
      document.getElementById('patientName').value = '';
      document.getElementById('patientAge').value = '';
      document.getElementById('patientDisease').value = '';
      document.getElementById('patientId').disabled = false;
      document.querySelector('.btn-add').textContent = 'Add Appointment';
      editingId = null;
      document.getElementById('errorMessage').style.display = 'none';
      document.getElementById('successMessage').style.display = 'none';
    }

    function filterTable() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const rows = document.querySelectorAll('#tableBody tr');

      rows.forEach(row => {
        const text = row.textContent.toLowerCase();
        row.style.display = text.includes(searchTerm) ? '' : 'none';
      });
    }

    function updateStats() {
      document.getElementById('totalAppointments').textContent = appointments.length;
      document.getElementById('totalPatients').textContent = appointments.length;

      if (appointments.length === 0) {
        document.getElementById('averageAge').textContent = '0';
        document.getElementById('commonDisease').textContent = '-';
        return;
      }

      const avgAge = Math.round(
        appointments.reduce((sum, a) => sum + parseInt(a.age), 0) / appointments.length
      );
      document.getElementById('averageAge').textContent = avgAge;

      const diseaseCount = {};
      appointments.forEach(a => {
        diseaseCount[a.disease] = (diseaseCount[a.disease] || 0) + 1;
      });

      const commonDisease = Object.keys(diseaseCount).reduce((a, b) =>
        diseaseCount[a] > diseaseCount[b] ? a : b
      );
      document.getElementById('commonDisease').textContent = commonDisease;
    }

    function showSuccess(message) {
      const msg = document.getElementById('successMessage');
      msg.textContent = '✓ ' + message;
      msg.style.display = 'block';
      setTimeout(() => msg.style.display = 'none', 3000);
    }

    function showError(message) {
      const msg = document.getElementById('errorMessage');
      msg.textContent = '✗ ' + message;
      msg.style.display = 'block';
      setTimeout(() => msg.style.display = 'none', 3000);
    }

    function saveAppointments() {
      localStorage.setItem('appointments', JSON.stringify(appointments));
    }
  </script>
</body>
</html>
